<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NO Recommender</title>
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1e2d45;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --accent: #22d3ee;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --purple: #a78bfa;
    --orange: #f97316;
    --cyan: #06b6d4;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); line-height: 1.5; min-height: 100vh;
  }
  .container { max-width: 1500px; margin: 0 auto; padding: 20px; }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
  .header h1 span { color: var(--accent); }
  .header h1 .no-tag { color: var(--red); }
  .mode-badge {
    display: inline-block; background: rgba(34,211,238,0.12); color: var(--accent);
    padding: 4px 12px; border-radius: 6px; font-size: 0.72rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; border: 1px solid rgba(34,211,238,0.25);
  }
  .mode-badge.paper {
    background: rgba(249,115,22,0.12); color: var(--orange);
    border-color: rgba(249,115,22,0.25);
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px;
    background: var(--green); animation: pulse 2s infinite;
  }
  .status-dot.offline { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; color: var(--text-dim); }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px 18px; position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); opacity: 0.4;
  }
  .stat-card.green::before { background: var(--green); }
  .stat-card.red::before { background: var(--red); }
  .stat-card.purple::before { background: var(--purple); }
  .stat-card.yellow::before { background: var(--yellow); }
  .stat-card.orange::before { background: var(--orange); }
  .stat-card.cyan::before { background: var(--cyan); }
  .stat-label {
    font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 4px;
  }
  .stat-value { font-size: 1.5rem; font-weight: 700; font-family: var(--mono); }
  .stat-sub { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; font-family: var(--mono); }
  .stat-value.positive { color: var(--green); }
  .stat-value.negative { color: var(--red); }

  .section-title {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-dim); margin: 24px 0 12px 0; padding-bottom: 6px;
    border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
  }
  .section-title .dot { width: 8px; height: 8px; border-radius: 50%; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 960px) { .panels { grid-template-columns: 1fr; } }
  .panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; min-height: 200px;
  }
  .panel-full { grid-column: 1 / -1; }
  .panel h2 {
    font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th {
    text-align: left; padding: 7px 8px; color: var(--text-dim);
    font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  td { padding: 7px 8px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.78rem; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
  }
  .badge-buy { background: rgba(34,211,238,0.15); color: var(--accent); }
  .badge-sell { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .badge-win { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-loss { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-sent { background: rgba(167,139,250,0.15); color: var(--purple); }
  .badge-failed { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-open { background: rgba(34,211,238,0.15); color: var(--accent); }
  .badge-hold { background: rgba(100,116,139,0.15); color: var(--text-dim); }
  .badge-tighten { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-drift { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .badge-paper { background: rgba(249,115,22,0.15); color: var(--orange); }
  .pnl-pos { color: var(--green); }
  .pnl-neg { color: var(--red); }
  .text-dim { color: var(--text-dim); }
  .text-sm { font-size: 0.7rem; }
  .mono { font-family: var(--mono); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-dim); }

  .rec-log { max-height: 400px; overflow-y: auto; }
  .rec-log::-webkit-scrollbar { width: 6px; }
  .rec-log::-webkit-scrollbar-track { background: var(--surface2); }
  .rec-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .rec-row {
    display: grid; grid-template-columns: 65px 80px 1fr 60px;
    gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border);
    font-size: 0.75rem; align-items: center;
  }
  .rec-row:last-child { border-bottom: none; }

  .pos-card {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; margin-bottom: 10px;
  }

  .refresh-bar {
    position: fixed; top: 0; left: 0; height: 2px; background: var(--accent);
    transition: width 0.3s ease; z-index: 100;
  }
  .timer-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 3px 10px; font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim);
  }
  .timer-badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .timer-badge .dot.metar { background: var(--green); }
  .timer-badge .dot.scan { background: var(--purple); }
  .timer-badge .dot.overdue { background: var(--red); animation: pulse 1s infinite; }
</style>
</head>
<body>

<div class="refresh-bar" id="refreshBar"></div>

<div class="container">
  <div class="header">
    <h1>WEATHER <span class="no-tag">NO</span> RECOMMENDER <span class="mode-badge" id="modeBadge">Loading...</span></h1>
    <div class="header-right">
      <div class="timer-badge" id="regionBadge" style="color:var(--yellow);"><span class="dot" style="background:var(--yellow);"></span><span id="regionText">--</span></div>
      <div class="timer-badge"><span class="dot metar" id="metarDot"></span>METAR <span id="metarCountdown">--</span></div>
      <div class="timer-badge"><span class="dot scan" id="scanDot"></span>Scan <span id="scanCountdown">--</span></div>
      <span><span class="status-dot" id="statusDot"></span><span id="statusText">Connected</span></span>
      <span id="lastUpdate"></span>
    </div>
  </div>

  <div class="stats" id="statsRow"></div>

  <div class="panels">
    <div class="panel">
      <h2>Real Positions (On-Chain)</h2>
      <div id="positionsTable"></div>
    </div>
    <div class="panel">
      <h2>Buy Recommendations</h2>
      <div id="buyRecs" class="rec-log"></div>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <h2>Sell Recommendations (Emailed)</h2>
      <div id="sellRecs" class="rec-log"></div>
    </div>
    <div class="panel">
      <h2>Monitoring Events</h2>
      <div id="eventLog" class="rec-log"></div>
    </div>
  </div>

  <div class="section-title" id="paperSection" style="display:none;">
    <span class="dot" style="background:var(--orange);"></span> Paper Trading
  </div>
  <div class="panels" id="paperPanels" style="display:none;">
    <div class="panel">
      <h2>Paper Open Positions</h2>
      <div id="paperOpen"></div>
    </div>
    <div class="panel">
      <h2>Paper Closed Trades</h2>
      <div id="paperClosed" class="rec-log"></div>
    </div>
  </div>
</div>

<script>
const REFRESH_MS = 15000;
let botTimers = { last_full_scan: 0, last_weather_poll: 0, metar_poll_seconds: 45, weather_poll_seconds: 600 };
let paperMode = false;

function $(id) { return document.getElementById(id); }
function pnlClass(v) { return v >= 0 ? 'pnl-pos' : 'pnl-neg'; }
function pnlStr(v) { return (v >= 0 ? '+' : '') + '$' + Math.abs(v).toFixed(2); }
function fmt$(v) { return '$' + Number(v).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function shortTime(iso) {
  if (!iso) return '--';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  } catch { return iso.slice(11,19); }
}
function timeAgo(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 0) return 'just now';
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function actionBadge(action) {
  if (!action) return '';
  const map = { hold: 'badge-hold', sell_take_profit: 'badge-win', sell_stop_loss: 'badge-loss',
    sell_forecast_conflict: 'badge-loss', sell_critical: 'badge-loss', forecast_drift: 'badge-drift',
    tighten: 'badge-tighten', wait_for_stop: 'badge-sell' };
  return `<span class="badge ${map[action] || 'badge-open'}">${(action||'?').replace(/_/g,' ')}</span>`;
}

function renderStats(data) {
  const paper = data.paper || {};
  const ps = paper.summary || {};
  const sellRecs = data.sell_recommendations || [];
  const buyRecs = data.buy_recommendations || [];
  const positions = data.positions || [];

  const totalPnl = sellRecs.reduce((s, r) => s + (r.pnl || 0), 0);
  const emailsSent = sellRecs.filter(r => r.email_sent).length;

  let html = '';

  // Real position stats
  const totalValue = positions.reduce((s, p) => s + (p.current_value || 0), 0);
  html += `<div class="stat-card">
    <div class="stat-label">Real NO Positions</div>
    <div class="stat-value">${positions.length}</div>
    <div class="stat-sub">${positions.length ? 'val $' + totalValue.toFixed(2) : 'no positions'}</div>
  </div>`;

  // Buy recs
  html += `<div class="stat-card green">
    <div class="stat-label">Buy Recs</div>
    <div class="stat-value">${buyRecs.length}</div>
    <div class="stat-sub">${buyRecs.filter(r => { const d = new Date(r.ts); return d.toDateString() === new Date().toDateString(); }).length} today</div>
  </div>`;

  // Sell recs
  html += `<div class="stat-card yellow">
    <div class="stat-label">Sell Recs</div>
    <div class="stat-value">${sellRecs.length}</div>
    <div class="stat-sub">${emailsSent} emails sent</div>
  </div>`;

  // Paper stats (only if paper trading)
  if (paperMode && ps.current_balance !== undefined) {
    html += `<div class="stat-card cyan">
      <div class="stat-label">Paper Balance</div>
      <div class="stat-value">${fmt$(ps.current_balance)}</div>
      <div class="stat-sub">start ${fmt$(ps.starting_bankroll)} (${ps.total_return_pct >= 0 ? '+' : ''}${ps.total_return_pct}%)</div>
    </div>`;
    html += `<div class="stat-card orange">
      <div class="stat-label">Paper Positions</div>
      <div class="stat-value">${ps.positions_opened || 0}</div>
      <div class="stat-sub">${ps.positions_closed || 0} closed / ${ps.positions_still_open || 0} open</div>
    </div>`;
    if (ps.positions_closed > 0) {
      html += `<div class="stat-card ${ps.total_pnl >= 0 ? 'green' : 'red'}">
        <div class="stat-label">Paper P/L</div>
        <div class="stat-value ${ps.total_pnl >= 0 ? 'positive' : 'negative'}">${pnlStr(ps.total_pnl)}</div>
        <div class="stat-sub">${ps.wins || 0}W / ${ps.losses || 0}L (${ps.win_rate || 0}%)</div>
      </div>`;
    }
  }

  $('statsRow').innerHTML = html;
}

function renderPositions(positions) {
  if (!positions || !positions.length) {
    $('positionsTable').innerHTML = '<div class="empty-state">No positions on-chain</div>';
    return;
  }
  let html = '';
  for (const p of positions) {
    const pnl = p.pnl || 0;
    const pnlPct = p.pnl_pct || 0;
    const costBasis = p.cost_basis || (p.size * p.avg_price);
    html += `<div class="pos-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <span class="badge ${p.outcome === 'No' ? 'badge-open' : 'badge-sell'}">${(p.outcome||'?').toUpperCase()}</span>
          <span style="font-weight:700;font-size:0.95rem;margin-left:8px;">${p.label}</span>
        </div>
        <span style="font-family:var(--mono);font-size:0.85rem;" class="${pnl >= 0 ? 'pnl-pos' : 'pnl-neg'}">${pnl >= 0 ? '+' : ''}$${Math.abs(pnl).toFixed(2)} (${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(1)}%)</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;font-size:0.78rem;font-family:var(--mono);">
        <div><div class="text-dim text-sm">Shares</div><div>${p.size.toFixed(2)}</div></div>
        <div><div class="text-dim text-sm">Avg Price</div><div>$${p.avg_price.toFixed(3)}</div></div>
        <div><div class="text-dim text-sm">Last Price</div><div style="color:var(--accent);">$${p.last_price.toFixed(3)}</div></div>
        <div><div class="text-dim text-sm">Cost / Value</div><div>$${costBasis.toFixed(2)} / $${p.current_value.toFixed(2)}</div></div>
        <div><div class="text-dim text-sm">Token</div><div class="text-dim">${p.token_id.slice(0,10)}...</div></div>
      </div>
    </div>`;
  }
  $('positionsTable').innerHTML = html;
}

function renderPaperOpen(positions) {
  if (!positions || Object.keys(positions).length === 0) {
    $('paperOpen').innerHTML = '<div class="empty-state">No open paper positions</div>';
    return;
  }
  let html = '';
  for (const [key, p] of Object.entries(positions)) {
    const city = (p.city_slug || '').toUpperCase();
    const lastEvent = (p.monitoring_events || []).slice(-1)[0] || {};
    const dist = lastEvent.distance_to_threshold != null ? lastEvent.distance_to_threshold.toFixed(1) : '--';
    const metar = lastEvent.metar_temp != null ? lastEvent.metar_temp.toFixed(1) : '--';
    const wcHigh = lastEvent.wc_high != null ? lastEvent.wc_high.toFixed(1) : '--';
    const opened = p.opened_at ? timeAgo(p.opened_at) : '--';

    html += `<div class="pos-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div>
          <span class="badge badge-paper">PAPER</span>
          <span style="font-weight:700;font-size:0.95rem;margin-left:8px;">${city} ${p.date} (${p.bucket_low}-${p.bucket_high})</span>
        </div>
        <span class="text-dim text-sm">opened ${opened}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;font-size:0.78rem;font-family:var(--mono);">
        <div><div class="text-dim text-sm">Bet</div><div>$${p.bet_size.toFixed(2)}</div></div>
        <div><div class="text-dim text-sm">Entry NO</div><div>$${p.entry_no_price.toFixed(3)}</div></div>
        <div><div class="text-dim text-sm">Shares</div><div>${p.shares.toFixed(2)}</div></div>
        <div><div class="text-dim text-sm">WC High</div><div style="color:var(--cyan);">${wcHigh}</div></div>
        <div><div class="text-dim text-sm">METAR</div><div>${metar}</div></div>
        <div><div class="text-dim text-sm">Dist</div><div>${dist}</div></div>
      </div>
      ${(p.monitoring_events || []).length > 0 ? `<div style="margin-top:8px;font-size:0.72rem;color:var(--text-dim);">Last action: ${actionBadge(lastEvent.action)} <span class="text-dim">${lastEvent.reason || ''}</span></div>` : ''}
    </div>`;
  }
  $('paperOpen').innerHTML = html;
}

function renderPaperClosed(positions) {
  if (!positions || !positions.length) {
    $('paperClosed').innerHTML = '<div class="empty-state">No closed paper trades yet</div>';
    return;
  }
  let html = '';
  for (const p of positions.slice().reverse()) {
    const city = (p.city_slug || '').toUpperCase();
    const pnl = p.pnl || 0;
    const reason = (p.exit_reason || '?').replace(/_/g, ' ');
    html += `<div class="rec-row">
      <span class="text-dim">${shortTime(p.closed_at)}</span>
      <span style="font-weight:600">${city}</span>
      <span><span class="badge ${pnl >= 0 ? 'badge-win' : 'badge-loss'}">${pnl >= 0 ? 'WIN' : 'LOSS'}</span> <span class="${pnlClass(pnl)}">${pnlStr(pnl)}</span> <span class="text-dim">${p.bucket_low}-${p.bucket_high} ${p.date || ''}</span></span>
      <span class="text-dim">${reason}</span>
    </div>`;
  }
  $('paperClosed').innerHTML = html;
}

function renderBuyRecs(recs) {
  if (!recs || !recs.length) {
    $('buyRecs').innerHTML = '<div class="empty-state">No buy recommendations yet</div>';
    return;
  }
  let html = '';
  const shown = recs.slice(0, 40);
  for (const r of shown) {
    const city = (r.city_slug || '').toUpperCase();
    const ts = shortTime(r.ts);
    const dist = r.distance != null ? r.distance.toFixed(1) + '&deg;' : '--';
    html += `<div class="rec-row">
      <span class="text-dim">${ts}</span>
      <span style="font-weight:600">${city}</span>
      <span><span class="badge badge-buy">BUY</span> $${(r.no_price||0).toFixed(3)} ${r.bet_size||1.0} &deg; dist=${dist} <span class="text-dim">${r.date||''}</span></span>
      <span class="text-dim">${(r.bucket_low||0)}-${(r.bucket_high||0)}</span>
    </div>`;
  }
  $('buyRecs').innerHTML = html;
}

function renderSellRecs(recs) {
  if (!recs || !recs.length) {
    $('sellRecs').innerHTML = '<div class="empty-state">No sell recommendations yet</div>';
    return;
  }
  let html = '';
  const shown = recs.slice(0, 40);
  for (const r of shown) {
    const city = (r.city_slug || '').toUpperCase();
    const ts = shortTime(r.ts);
    const pnl = r.pnl || 0;
    const email = r.email_sent ? '<span class="badge badge-sent">SENT</span>' : '<span class="badge badge-failed">SUPPRESSED</span>';
    const reason = (r.reason || '').replace(/_/g, ' ');
    html += `<div class="rec-row">
      <span class="text-dim">${ts}</span>
      <span style="font-weight:600">${city}</span>
      <span><span class="badge badge-sell">SELL</span> <span class="${pnlClass(pnl)}">${pnlStr(pnl)}</span> <span class="text-dim">${reason} ${r.date||''}</span></span>
      <span>${email}</span>
    </div>`;
  }
  $('sellRecs').innerHTML = html;
}

function renderEvents(events) {
  if (!events || !events.length) {
    $('eventLog').innerHTML = '<div class="empty-state">No monitoring events yet</div>';
    return;
  }
  let html = '';
  for (const e of events.slice(0, 50)) {
    const city = e.city_slug ? e.city_slug.toUpperCase() : (e.key || '').split('_')[0].toUpperCase();
    const ts = shortTime(e.ts);
    let detail = '';
    if (e.type === 'entry') {
      detail = `<span class="badge badge-buy">BUY</span> $${(e.bet_size||0).toFixed(2)} NO @ $${(e.entry_no_price||0).toFixed(3)}`;
    } else if (e.type === 'exit') {
      const pnl = e.pnl || 0;
      detail = `<span class="badge ${pnl >= 0 ? 'badge-win' : 'badge-loss'}">SELL</span> PnL: <span class="${pnlClass(pnl)}">${pnlStr(pnl)}</span>`;
    } else {
      const parts = [];
      if (e.metar_temp != null) parts.push(`METAR <b>${e.metar_temp.toFixed(1)}</b>`);
      if (e.wc_high != null) parts.push(`WC High <b>${e.wc_high.toFixed(1)}</b>`);
      if (e.wc_current != null) parts.push(`WC Now <b>${e.wc_current}</b>`);
      if (e.diff != null) parts.push(`diff=${e.diff}`);
      if (e.distance_to_threshold != null) parts.push(`dist=${e.distance_to_threshold.toFixed(1)}`);
      if (e.closing_in) parts.push('<span style="color:var(--orange);">CLOSING IN</span>');
      if (e.pnl_pct != null) parts.push(`<span class="${pnlClass(e.pnl_pct)}">${e.pnl_pct > 0 ? '+' : ''}${e.pnl_pct.toFixed(1)}%</span>`);
      parts.push(actionBadge(e.action));
      if (e.reason) parts.push(`<span class="text-dim text-sm">${e.reason}</span>`);
      detail = parts.join(' &middot; ');
    }
    html += `<div class="rec-row">
      <span class="text-dim">${ts}</span>
      <span style="font-weight:600">${city}</span>
      <span class="text-dim">${detail}</span>
      <span class="text-dim text-sm">${e.date || ''}</span>
    </div>`;
  }
  $('eventLog').innerHTML = html;
}

async function refresh() {
  const bar = $('refreshBar');
  bar.style.width = '0%';
  bar.style.transition = 'none';
  requestAnimationFrame(() => { bar.style.transition = 'width 0.5s ease'; bar.style.width = '100%'; });

  try {
    const res = await fetch('/api/all');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();

    // Check paper mode
    const paper = data.paper || {};
    paperMode = paper.paper_trading || false;
    if (paperMode) {
      $('modeBadge').textContent = 'PAPER TRADING';
      $('modeBadge').className = 'mode-badge paper';
      $('paperSection').style.display = '';
      $('paperPanels').style.display = '';
    } else {
      $('modeBadge').textContent = 'RECOMMENDATION ONLY';
      $('modeBadge').className = 'mode-badge';
      $('paperSection').style.display = 'none';
      $('paperPanels').style.display = 'none';
    }

    renderStats(data);
    renderPositions(data.positions);
    renderBuyRecs(data.buy_recommendations);
    renderSellRecs(data.sell_recommendations);
    renderEvents(data.events);
    renderPaperOpen(paper.open_positions);
    renderPaperClosed(paper.closed_positions);

    // Timers
    if (data.timers) {
      botTimers = data.timers;
      updateCountdowns();
    }

    // Regions
    if (data.regions) {
      $('regionText').textContent = data.regions.ist_hour + ' IST \u2014 ' + data.regions.window;
    }

    $('statusDot').className = 'status-dot';
    $('statusText').textContent = 'Connected';
    $('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();

  } catch (e) {
    $('statusDot').className = 'status-dot offline';
    $('statusText').textContent = 'Disconnected';
  }
}

function updateCountdowns() {
  const now = Date.now() / 1000;
  const metarSec = Math.max(0, Math.round((botTimers.last_weather_poll + botTimers.metar_poll_seconds) - now));
  const scanSec = Math.max(0, Math.round((botTimers.last_full_scan + botTimers.weather_poll_seconds) - now));

  const metarEl = $('metarCountdown');
  const scanEl = $('scanCountdown');
  const metarDot = $('metarDot');
  const scanDot = $('scanDot');

  if (metarSec <= 0 && botTimers.last_weather_poll > 0) {
    metarEl.textContent = 'now';
    metarDot.className = 'dot metar overdue';
  } else {
    metarEl.textContent = metarSec + 's';
    metarDot.className = 'dot metar';
  }

  if (scanSec <= 0 && botTimers.last_full_scan > 0) {
    scanEl.textContent = 'now';
    scanDot.className = 'dot scan overdue';
  } else {
    scanEl.textContent = scanSec + 's';
    scanDot.className = 'dot scan';
  }
}

setInterval(updateCountdowns, 1000);
refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
